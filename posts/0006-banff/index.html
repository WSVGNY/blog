        gallery: '.pswp-gallery',
        children: 'a',
        showAnimationDuration: 200,
        hideAnimationDuration: 200,
        imageClickAction: 'close',
        tapAction: 'zoom',
        doubleTapAction: false,
        bgClickAction: 'close',

        pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.min.js')
    });
    lightbox.init();
</script>
