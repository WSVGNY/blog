        gallery: '.pswp-gallery',
        children: 'a',
        showAnimationDuration: 200,
        hideAnimationDuration: 200,
        imageClickAction: 'close',
        tapAction: 'zoom',

        bgClickAction: 'close',

    });
    lightbox.init();
</script>
