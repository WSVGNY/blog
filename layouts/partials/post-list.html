<div>
    <p style="text-decoration: underline; font-style: italic;">
        WILLIAMSEVIGNY.COM
    </p>
    <ul class="post-list">
        {{ range (where .Site.RegularPages.ByDate.Reverse "Type" "posts") }}
        <li class="post-list-item">
            <span style="text-transform: uppercase;">
                {{ .Title }}
            </span>
            <a href="{{ .Permalink }}">
                » click here
            </a>
        </li>
        {{ end }}
    </ul>
</div>
