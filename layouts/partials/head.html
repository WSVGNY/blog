<head>
    <!-- Basic Page Needs
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <meta charset="utf-8">
    <title>William – Photos</title>
    <meta name="description" content="Pictures">
    <meta name="author" content="William Sevigny">

    <!-- Mobile Specific Metas
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- URL
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <base href="{{ .Site.BaseURL }}">

    <!-- CSS
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link rel="stylesheet" href="/blog/normalize.css">
    <link rel="stylesheet" href="/blog/skeleton.css">
    <link rel="stylesheet" href="/blog/styles.css">
    <link rel="icon" type="image/x-icon" href="/blog/website_v2_no_back.ico">

    <!-- Libraries
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css" />
    <link rel="stylesheet" href="/blog/photoswipe-style-override.css" />

    <!-- Fonts
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
</head>

<script type="module">
    import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';
    const lightbox = new PhotoSwipeLightbox({
        gallery: '.pswp-gallery',
        children: 'a',
        showAnimationDuration: 200,
        hideAnimationDuration: 200,
        imageClickAction: 'close',
        tapAction: 'zoom',
        doubleTapAction: false,
        bgClickAction: 'close',
        padding: { top: 20, bottom: 20, left: 10, right: 10 },
        pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.min.js')
    });
    lightbox.init();
</script>
